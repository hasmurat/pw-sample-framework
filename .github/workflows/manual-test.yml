name: Manual Playwright Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - preprod
          - prod
        default: staging
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
    secrets:
      EMAIL_ADDRESS:
        required: true
      PASSWORD:
        required: true
      MAILSLURP_API_KEY:
        required: true
      MAILSLURP_INBOX_ID:
        required: true
      SIGN_UP_FLOW:
        required: true
      BASE_URL:
        required: true
      API_URL:
        required: false

jobs:
  tests:
    name: Playwright Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      PASSWORD: ${{ secrets.PASSWORD }}
      MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
      MAILSLURP_INBOX_ID: ${{ secrets.MAILSLURP_INBOX_ID }}
      SIGN_UP_FLOW: ${{ secrets.SIGN_UP_FLOW }}
      BASE_URL: ${{ secrets.BASE_URL }}
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ inputs.environment }}
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ inputs.environment }}
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.environment }}
          path: playwright-report
          if-no-files-found: ignore
