# Reusable Workflow: Manual Test Trigger
#
# Purpose: Execute Playwright tests against a specified environment
#
# Triggers:
# 1. Manual dispatch via GitHub UI (workflow_dispatch)
# 2. Called by other workflows (workflow_call)
#
# Environments supported: staging, preprod, prod
#
# Usage (Manual):
#   - Go to Actions tab
#   - Select "Run tests with custom configuration"
#   - Click "Run workflow"
#   - Choose environment
#   - Click "Run workflow"
#
# Usage (CLI):
#   gh workflow run manual-trigger.yml -f environment=staging
#
# Usage (Called by another workflow):
#   uses: ./.github/workflows/manual-trigger.yml
#   with:
#     environment: staging
#   secrets: inherit

name: Run tests with custom configuration

on:
  # Manual trigger via GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to run tests against
        required: true
        type: choice
        options:
          - staging     # Staging environment
          - preprod     # Pre-production environment
          - prod        # Production environment
        default: staging

  # Reusable workflow - can be called by other workflows
  workflow_call:
    inputs:
      environment:
        description: Target environment to run tests against
        required: true
        type: string
    secrets:
      # Test credentials
      EMAIL_ADDRESS:
        required: true
      PASSWORD:
        required: true
      # Email verification service (MailSlurp)
      MAILSLURP_API_KEY:
        required: true
      MAILSLURP_INBOX_ID:
        required: true
      # Application configuration
      SIGN_UP_FLOW:
        required: true
      BASE_URL:
        required: true
      API_URL:
        required: false

jobs:
  tests:
    name: Playwright Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      PASSWORD: ${{ secrets.PASSWORD }}
      MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
      MAILSLURP_INBOX_ID: ${{ secrets.MAILSLURP_INBOX_ID }}
      SIGN_UP_FLOW: ${{ secrets.SIGN_UP_FLOW }}
      BASE_URL: ${{ secrets.BASE_URL }}
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: npx allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ inputs.environment }}
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ inputs.environment }}
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ inputs.environment }}
          path: playwright-report
          if-no-files-found: ignore
