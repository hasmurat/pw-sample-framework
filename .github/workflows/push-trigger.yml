name: Test Automation Workflow on push and pull request

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: Run tests on staging
    uses: ./.github/workflows/manual-test.yml
    with:
      environment: staging
    secrets: inherit